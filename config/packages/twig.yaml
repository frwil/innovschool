twig:
    file_name_pattern: '*.twig'
    form_themes: ['bootstrap_4_layout.html.twig']
    globals:
        module_manager: '@App\Service\ModuleManager'
    default_path: '%kernel.project_dir%/templates'
    debug: '%kernel.debug%'
    strict_variables: '%kernel.debug%' 

when@test:
    twig:
        strict_variables: true
