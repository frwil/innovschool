[global]
daemonize = no
error_log = /proc/self/fd/2

[www]
user = www
group = www
listen = 9000
listen.owner = www
listen.group = www

; Pool management
pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 500

; Logging
catch_workers_output = yes

; Security
php_admin_value[upload_tmp_dir] = /tmp
php_admin_value[session.save_path] = /tmp
